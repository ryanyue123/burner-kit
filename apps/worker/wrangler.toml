name = "burner-kit-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "burner-kit-dev"
database_id = "local-burner-kit-dev"
migrations_dir = "drizzle"

[dev]
port = 8787

[vars]
BETTER_AUTH_URL = "http://localhost:8787"
EXTENSION_ORIGIN = "chrome-extension://gjkdmhmhmoahlkpcmkedpdjpahjkciip"

[ai]
binding = "AI"

[[queues.producers]]
queue = "code-extraction"
binding = "CODE_EXTRACTION_QUEUE"

[[queues.consumers]]
queue = "code-extraction"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "code-extraction-dlq"

[triggers]
crons = ["*/1 * * * *"]
